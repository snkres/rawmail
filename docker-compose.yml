version: '3.9'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://rawmail:rawmail@postgres:5432/rawmail
      - REDIS_URL=redis://redis:6379
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN:-}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET:-}
      - POLAR_SERVER=${POLAR_SERVER:-sandbox}
      - POLAR_TEAMS_PRODUCT_ID=${POLAR_TEAMS_PRODUCT_ID:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - WEB_URL=${WEB_URL:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  mail:
    build:
      context: .
      dockerfile: apps/mail/Dockerfile
    ports:
      - "25:25"
    environment:
      - DATABASE_URL=postgresql://rawmail:rawmail@postgres:5432/rawmail
      - REDIS_URL=redis://redis:6379
      - RAWMAIL_DOMAIN=${RAWMAIL_DOMAIN:-rawmail.sh}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rawmail
      POSTGRES_PASSWORD: rawmail
      POSTGRES_DB: rawmail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rawmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  caddy_data:
